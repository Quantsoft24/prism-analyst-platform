# ══════════════════════════════════════════════════════════════
#  PRISM — Production Nginx Configuration
#  Handles 3 subdomains with SSL, security headers, gzip,
#  rate limiting, and SSE support for streaming responses.
#
#  Uses Docker DNS resolver (127.0.0.11) so upstream IPs are
#  re-resolved on every request — no stale IP issues when
#  containers restart.
# ══════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    # ── Docker DNS resolver (re-resolve on every request) ──
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Logging ──
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

    # ══════════════════════════════════════════════════
    # thequantsoft.co.in — Landing Page
    # ══════════════════════════════════════════════════

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name thequantsoft.co.in www.thequantsoft.co.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://thequantsoft.co.in$request_uri;
        }
    }

    # www → non-www redirect
    server {
        listen 443 ssl;
        server_name www.thequantsoft.co.in;

        ssl_certificate     /etc/letsencrypt/live/thequantsoft.co.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/thequantsoft.co.in/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://thequantsoft.co.in$request_uri;
    }

    # HTTPS — Landing
    server {
        listen 443 ssl;
        server_name thequantsoft.co.in;

        ssl_certificate     /etc/letsencrypt/live/thequantsoft.co.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/thequantsoft.co.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL_LANDING:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10M;

        location / {
            set $landing_target landing:4000;
            proxy_pass http://$landing_target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Contact form — rate limited
        location /api/contact {
            limit_req zone=contact burst=3 nodelay;

            set $landing_target landing:4000;
            proxy_pass http://$landing_target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ══════════════════════════════════════════════════
    # prism.thequantsoft.co.in — Next.js Frontend
    # ══════════════════════════════════════════════════

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name prism.thequantsoft.co.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — Frontend
    server {
        listen 443 ssl;
        server_name prism.thequantsoft.co.in;

        ssl_certificate     /etc/letsencrypt/live/prism.thequantsoft.co.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prism.thequantsoft.co.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL_PRISM:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 50M;

        # Next.js HMR / WebSocket support (dev + production)
        location / {
            set $frontend_target frontend:3000;
            proxy_pass http://$frontend_target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ══════════════════════════════════════════════════
    # api.thequantsoft.co.in — FastAPI Backend
    # ══════════════════════════════════════════════════

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name api.thequantsoft.co.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — Backend API
    server {
        listen 443 ssl;
        server_name api.thequantsoft.co.in;

        ssl_certificate     /etc/letsencrypt/live/api.thequantsoft.co.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.thequantsoft.co.in/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL_API:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://prism.thequantsoft.co.in" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age 86400 always;

        client_max_body_size 50M;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        location / {
            limit_req zone=api burst=10 nodelay;

            set $backend_target backend:8000;
            proxy_pass http://$backend_target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support (critical for chat responses)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # Health check — no rate limit
        location /health {
            set $backend_target backend:8000;
            proxy_pass http://$backend_target;
            proxy_set_header Host $host;
        }
    }
}
