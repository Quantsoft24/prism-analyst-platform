# ══════════════════════════════════════════════════════════════
#  PRISM — Production Docker Compose
#  All 4 services on a single EC2 instance
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up -d --build
#    docker compose -f docker-compose.prod.yml ps
#    docker compose -f docker-compose.prod.yml logs -f
# ══════════════════════════════════════════════════════════════

services:

  # ── TheQuantSoft Landing Page (:4000) ──
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    container_name: prism-landing
    restart: unless-stopped
    env_file: ./thequantsoft/.env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - prism-net

  # ── PRISM Frontend — Next.js (:3000) ──
  #
  # NEXT_PUBLIC_* MUST be passed at BUILD time (Next.js inlines them statically
  # into the JS bundles when `next build` runs). The compose `environment:`
  # block only sets runtime container env — too late for static replacement.
  # See the matching ARG/ENV lines in Dockerfile's builder stage.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.thequantsoft.co.in
        NEXT_PUBLIC_LANDING_URL: https://thequantsoft.co.in
        NEXT_PUBLIC_LIVE_API: "false"
        NEXT_PUBLIC_STREAMING: "false"
        NEXT_PUBLIC_AUTH: "false"
    container_name: prism-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/chat', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - prism-net

  # ── PRISM Backend — FastAPI (:8000) ──
  #
  # Database is OPTIONAL. The backend runs fine without it
  # (health check + mock data only). When you add a database:
  #   1. Update ../prism-analyst-services/.env with DB_HOST, DB_PASSWORD etc.
  #   2. If using AWS RDS with SSL, uncomment the volumes section below
  #      and place global-bundle.pem in the backend repo root.
  #   3. Restart: docker compose -f docker-compose.prod.yml up -d backend
  #
  backend:
    build:
      context: ../prism-analyst-services
      dockerfile: Dockerfile
    # Tag the built image so the worker (below) reuses it instead of building a
    # second time — they're the same code, just a different entrypoint.
    image: prism-backend:latest
    container_name: prism-backend
    restart: unless-stopped
    env_file: ../prism-analyst-services/.env
    ports:
      - "8000:8000"
    # ── Uncomment when database with SSL is configured ──
    # volumes:
    #   - ../prism-analyst-services/global-bundle.pem:/app/global-bundle.pem:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - prism-net

  # ── PRISM Backtest Worker (no ports) ──
  #
  # Durable backtest jobs (pb_backtests) are claimed and run here, NOT in the
  # web process — the API only enqueues. Same image as `backend` (reused via the
  # `prism-backend:latest` tag, so no second build), different entrypoint. Reads
  # the same env (primary DB for the job queue + investment RDS for prices). If
  # this service isn't running, submitted backtests stay `queued` forever.
  # Restart-safe: it reclaims stale RUNNING jobs on startup and claims work with
  # FOR UPDATE SKIP LOCKED, so multiple replicas are safe.
  worker:
    image: prism-backend:latest
    container_name: prism-worker
    restart: unless-stopped
    env_file: ../prism-analyst-services/.env
    command: ["python", "-m", "src.portfolio.worker"]
    # ── Uncomment alongside backend when DB SSL uses a CA bundle ──
    # volumes:
    #   - ../prism-analyst-services/global-bundle.pem:/app/global-bundle.pem:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - prism-net

  # ── Nginx Reverse Proxy (:80/:443) ──
  nginx:
    image: nginx:alpine
    container_name: prism-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      landing:
        condition: service_started
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - prism-net

networks:
  prism-net:
    driver: bridge
