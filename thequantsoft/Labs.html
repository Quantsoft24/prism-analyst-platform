<!doctype html>
<html lang="en">
<head>
<script src="/config.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quantsoft Labs — AI Infrastructure for Finance & Enterprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css"/>
<style>
  /* Override default 80px section padding for this page */
  body section.labs-sec { padding: 44px 0 !important; }
  body section.labs-sec-lg { padding: 56px 0 !important; }

  .labs-hero-grid { display:grid; grid-template-columns: 180px 1fr; gap: 40px; align-items: baseline; }
  .labs-cap-row { display:grid; grid-template-columns: 80px 1fr 1.05fr; gap: 32px; padding: 24px 0; border-bottom: 1px solid var(--rule); align-items: start; }
  .labs-cap-row:last-child { border-bottom: none; padding-bottom: 8px; }
  .labs-how-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid var(--ink); }
  .labs-ind-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .labs-why-grid { display:grid; grid-template-columns: 1fr 1.1fr; gap: 48px; align-items: center; }
  .labs-why-stats { display:grid; grid-template-columns: repeat(2, 1fr); gap: 0; border-top: 1px solid var(--ink-3); }

  /* Tighter section-head margin */
  body .labs-sec .section-head,
  body .labs-sec-lg .section-head { margin-bottom: 24px; }

  @media (max-width: 960px) {
    body section.labs-sec { padding: 36px 0 !important; }
    body section.labs-sec-lg { padding: 44px 0 !important; }
    .labs-hero-grid { grid-template-columns: 1fr !important; gap: 14px !important; }
    .labs-cap-row { grid-template-columns: 1fr !important; gap: 12px !important; padding: 20px 0; }
    .labs-how-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .labs-ind-grid { grid-template-columns: 1fr !important; }
    .labs-why-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
  }
  @media (max-width: 640px) {
    .labs-how-grid { grid-template-columns: 1fr !important; }
    .labs-why-stats { grid-template-columns: 1fr !important; }
  }
</style>
  <script src="/config.js"></script>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/Nav.jsx"></script>

<script type="text/babel">
const { useState } = React;

/* ============ HERO (combined intro) ============ */
function LabsHero() {
  return (
    <section className="labs-sec-lg" style={{borderBottom: "1px solid var(--rule)", overflow: "hidden"}}>
      <div className="container">
        <div className="labs-hero-grid">
          <div>
            <span className="eyebrow" style={{borderTop:"1px solid var(--ink)", paddingTop:10, display:"inline-block"}}>
              Quantsoft Labs
            </span>
          </div>
          <div>
            <h1 className="display" style={{fontSize:"clamp(36px, 4.6vw, 68px)", margin:"0 0 18px", letterSpacing:"-0.03em", lineHeight: 1.05}}>
              AI infrastructure for <em style={{fontStyle:"italic", color:"var(--accent)"}}>finance</em> &amp; enterprise.
            </h1>
            <p style={{fontSize:18, color:"var(--ink-2)", maxWidth:720, lineHeight:1.55, margin: "0 0 14px"}}>
              Quantsoft Labs is the applied technology arm of Quantsoft. We design and build AI-powered systems, automation infrastructure, and decision platforms for organizations where precision, speed, and reliability aren't optional.
            </p>
            <p style={{fontSize:15, color:"var(--muted)", maxWidth:720, lineHeight:1.6, margin: "0 0 20px"}}>
              Our work goes beyond software delivery. We solve structural inefficiencies through engineering discipline, applied AI, and deep domain expertise — particularly across financial services and operationally complex enterprises. Each engagement starts with a problem worth solving — not a technology looking for a use case.
            </p>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <a href="Contact.html" className="btn btn-primary">Get in touch <span className="arr">→</span></a>
              <a href="#capabilities" className="btn btn-ghost">See capabilities</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============ CAPABILITIES ============ */
function Capabilities() {
  const caps = [
    { n: "01", t: "AI Agents & Workflow Automation", d: "Autonomous systems that execute research, triage operations, manage support workflows, and coordinate multi-step processes — with human oversight built in, not bolted on.", tags: ["Research agents", "Triage", "Support workflows", "Multi-step orchestration"] },
    { n: "02", t: "Financial Services Technology", d: "Purpose-built infrastructure for banks, asset managers, fintechs, and research firms. Investment workflow engines, regulatory intelligence, compliance tooling, and financial data platforms — engineered for the standards the industry demands.", tags: ["Investment workflows", "Regulatory intelligence", "Compliance tooling", "Financial data platforms"] },
    { n: "03", t: "Process Automation & Orchestration", d: "Structured automation that eliminates manual overhead: intelligent document processing, workflow orchestration, and backend systems designed to scale without adding headcount.", tags: ["Document processing", "Workflow orchestration", "Backend systems", "Scale without headcount"] },
    { n: "04", t: "Custom AI Products & Platforms", d: "Tailored applications and internal tools shaped around your operations — not adapted from someone else's template. Decision-support systems, knowledge platforms, and operational dashboards built for how your teams actually work.", tags: ["Decision-support", "Knowledge platforms", "Operational dashboards", "Internal tools"] },
    { n: "05", t: "Data Infrastructure & Intelligence", d: "Systems that consolidate fragmented data into clear, actionable operational intelligence. Less noise. Better decisions. Faster execution.", tags: ["Data consolidation", "Operational intelligence", "Real-time signals", "Actionable insight"] },
  ];
  return (
    <section id="capabilities" className="labs-sec-lg" style={{borderTop:"1px solid var(--rule)", background: "var(--paper)"}}>
      <div className="container">
        <div className="section-head">
          <div><span className="eyebrow">Capabilities</span></div>
          <h2>Five disciplines.<br/>One delivery team.</h2>
        </div>
        <div style={{borderTop:"1px solid var(--ink)"}}>
          {caps.map((c, i) => (
            <div key={i} className="labs-cap-row">
              <div className="mono" style={{fontSize: 12, color: "var(--accent)", letterSpacing: "0.08em", paddingTop: 4}}>CAP · {c.n}</div>
              <div>
                <div className="display" style={{fontSize: "clamp(20px, 2vw, 26px)", letterSpacing: "-0.02em", lineHeight: 1.18, marginBottom: 8}}>{c.t}</div>
                <p style={{margin: 0, color: "var(--ink-2)", fontSize: 14.5, lineHeight: 1.6}}>{c.d}</p>
              </div>
              <div style={{display: "flex", flexWrap: "wrap", gap: 6, alignContent: "flex-start", paddingTop: 4}}>
                {c.tags.map((t, j) => (
                  <span key={j} className="chip mono" style={{textTransform: "none", letterSpacing: 0, fontSize: 11, background: "var(--ivory)"}}>{t}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ============ HOW WE WORK ============ */
function HowWeWork() {
  const disciplines = [
    { n: "AI Engineering", d: "Agents, retrieval, structured extraction, reasoning over complex enterprise data." },
    { n: "Systems Architecture", d: "Reliable infrastructure built to institutional standards — not prototype-grade scaffolding." },
    { n: "Financial Domain Expertise", d: "Deep familiarity with filings, markets, compliance, and operational workflows." },
    { n: "Workflow Design", d: "Mapping the real shape of human + machine processes — and engineering them end-to-end." },
  ];
  return (
    <section className="labs-sec" style={{borderTop:"1px solid var(--rule)"}}>
      <div className="container">
        <div className="section-head">
          <div><span className="eyebrow">How we work</span></div>
          <h2>Four disciplines, usually siloed —<br/>here, integrated.</h2>
        </div>
        <p style={{fontSize: 16, color: "var(--ink-2)", maxWidth: 760, marginTop: 0, marginBottom: 20, lineHeight: 1.55}}>
          That integration is the point. We ship solutions that work on day one, scale without rearchitecting, and deliver outcomes you can measure — not proofs of concept that stall after the demo.
        </p>
        <div className="labs-how-grid">
          {disciplines.map((p, i) => (
            <div key={i} style={{padding: "20px 18px 22px", borderRight: i < 3 ? "1px solid var(--rule)" : "none", borderBottom: "1px solid var(--rule)", background: "var(--paper)"}}>
              <div className="mono" style={{fontSize: 11, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10}}>0{i + 1}</div>
              <div className="display" style={{fontSize: 20, letterSpacing: "-0.02em", marginBottom: 8, lineHeight: 1.18}}>{p.n}</div>
              <div style={{fontSize: 13.5, color: "var(--muted)", lineHeight: 1.55}}>{p.d}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ============ INDUSTRIES ============ */
function Industries() {
  const core = ["Banking & Financial Services", "Insurance", "Capital Markets", "Financial Research", "Fintech"];
  const ext = ["Enterprise Operations", "Knowledge Management", "Process Automation", "Internal Tooling"];
  return (
    <section className="labs-sec" style={{borderTop:"1px solid var(--rule)", background: "var(--paper)"}}>
      <div className="container">
        <div className="section-head">
          <div><span className="eyebrow">Industries</span></div>
          <h2>Core focus.<br/>Extended reach.</h2>
        </div>
        <div className="labs-ind-grid">
          <div style={{border: "1px solid var(--rule)", borderRadius: 14, padding: 24, background: "var(--ivory)"}}>
            <div className="mono" style={{fontSize: 11, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10}}>Core focus</div>
            <div className="display" style={{fontSize: 22, letterSpacing: "-0.02em", marginBottom: 14, lineHeight: 1.2}}>Built for finance.</div>
            <div>
              {core.map((c, i) => (
                <div key={i} style={{display: "flex", gap: 12, alignItems: "center", padding: "10px 0", borderTop: i === 0 ? "1px solid var(--rule)" : "1px solid var(--rule-2)"}}>
                  <span className="mono" style={{color: "var(--accent)", fontSize: 12, width: 24}}>0{i+1}</span>
                  <span style={{fontSize: 14.5, color: "var(--ink)"}}>{c}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{border: "1px solid var(--rule)", borderRadius: 14, padding: 24, background: "var(--ivory)"}}>
            <div className="mono" style={{fontSize: 11, color: "var(--indigo)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10}}>Extended reach</div>
            <div className="display" style={{fontSize: 22, letterSpacing: "-0.02em", marginBottom: 14, lineHeight: 1.2}}>Operationally complex enterprises.</div>
            <div>
              {ext.map((c, i) => (
                <div key={i} style={{display: "flex", gap: 12, alignItems: "center", padding: "10px 0", borderTop: i === 0 ? "1px solid var(--rule)" : "1px solid var(--rule-2)"}}>
                  <span className="mono" style={{color: "var(--indigo)", fontSize: 12, width: 24}}>0{i+1}</span>
                  <span style={{fontSize: 14.5, color: "var(--ink)"}}>{c}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============ WHY QUANTSOFT LABS ============ */
function WhyLabs() {
  const outcomes = [
    ["Reduce", "operational friction"],
    ["Augment", "human decision-making"],
    ["Build", "infrastructure that scales"],
    ["Deliver", "measurable ROI"],
  ];
  return (
    <section className="labs-sec-lg" style={{borderTop:"1px solid var(--ink)", background: "var(--ink)", color: "var(--ivory)"}}>
      <div className="container">
        <div className="labs-why-grid">
          <div>
            <div className="eyebrow" style={{color: "var(--muted-2)", borderTop: "1px solid var(--muted)", paddingTop: 10, display: "inline-block"}}>Why Quantsoft Labs</div>
            <h2 className="display" style={{color: "var(--ivory)", fontSize: "clamp(28px, 3.6vw, 44px)", margin: "14px 0 14px", letterSpacing: "-0.02em", lineHeight: 1.08}}>
              We don't build features.<br/>We build <em style={{color: "var(--accent)", fontStyle: "italic"}}>systems</em>.
            </h2>
            <p style={{color: "var(--muted-2)", fontSize: 15, lineHeight: 1.6, maxWidth: 460, margin: "0 0 10px"}}>
              Features solve surface-level problems. Systems solve structural ones.
            </p>
            <p style={{color: "var(--muted-2)", fontSize: 14, lineHeight: 1.6, maxWidth: 460, margin: 0}}>
              Every engagement is oriented around four outcomes — friction, decisions, scale, and ROI that shows up in the numbers.
            </p>
          </div>
          <div className="labs-why-stats">
            {outcomes.map(([verb, obj], i) => (
              <div key={i} style={{
                padding: "18px 18px 20px",
                borderRight: i % 2 === 0 ? "1px solid var(--ink-3)" : "none",
                borderBottom: i < 2 ? "1px solid var(--ink-3)" : "none",
              }}>
                <div className="mono" style={{fontSize: 11, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10}}>Outcome · 0{i+1}</div>
                <div className="display" style={{fontSize: 22, color: "var(--ivory)", letterSpacing: "-0.02em", lineHeight: 1.2}}>
                  <span style={{color: "var(--accent)", fontStyle: "italic"}}>{verb}</span>
                  <br/>
                  <span style={{color: "var(--ivory)"}}>{obj}.</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============ LET'S TALK ============ */
function LetsTalk() {
  return (
    <section className="labs-sec" style={{borderTop: "1px solid var(--rule)", background: "var(--ivory)"}}>
      <div className="container" style={{textAlign: "center", maxWidth: 880}}>
        <div className="eyebrow" style={{display: "inline-block"}}>Let's talk</div>
        <h2 className="display" style={{fontSize: "clamp(28px, 3.4vw, 44px)", margin: "12px auto 14px", letterSpacing: "-0.03em", lineHeight: 1.1}}>
          Modernizing legacy workflows. Deploying AI into production. Building infrastructure from the ground up.
        </h2>
        <p style={{color: "var(--ink-2)", fontSize: 16, lineHeight: 1.55, maxWidth: 640, margin: "0 auto 20px"}}>
          We'll help you design and ship systems engineered for the real world.
        </p>
        <a href="Contact.html" className="btn btn-primary" style={{padding: "14px 24px"}}>
          Get in touch <span className="arr">→</span>
        </a>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <Nav active="labs"/>
      <LabsHero/>
      <Capabilities/>
      <HowWeWork/>
      <Industries/>
      <WhyLabs/>
      <LetsTalk/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
